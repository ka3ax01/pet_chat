<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backend Logs</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5c6670;
      --line: #d8dde3;
      --accent: #0f766e;
      --warn: #b45309;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    main { padding: 16px 24px 24px; }

    form {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
      align-items: end;
    }

    .auth {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    input, select { padding: 0 10px; }

    button {
      cursor: pointer;
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #eef2f5;
      color: #334155;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:hover td { background: #f9fafb; }

    .level {
      display: inline-flex;
      min-width: 64px;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e7f5f2;
      color: var(--accent);
    }

    .level.Error {
      background: #fee2e2;
      color: var(--error);
    }

    .level.Warning {
      background: #fef3c7;
      color: var(--warn);
    }

    .message {
      max-width: 360px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .muted { color: var(--muted); }

    .footer {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 12px;
      color: var(--muted);
    }

    .footer button {
      width: 36px;
      padding: 0;
    }

    @media (max-width: 900px) {
      header, main { padding-left: 14px; padding-right: 14px; }
      form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Backend Logs</h1>
  </header>

  <main>
    <div class="auth">
      <label>
        Bearer token
        <input id="token" type="password" placeholder="Paste an Admin JWT">
      </label>
      <button id="save-token" type="button">Use token</button>
    </div>

    <form id="filters">
      <label>
        Level
        <select name="level">
          <option value="">All</option>
          <option value="Error">Error</option>
          <option value="Warning">Warning</option>
          <option value="Information">Information</option>
        </select>
      </label>
      <label>
        Search
        <input name="search" type="search" placeholder="message, exception, trace">
      </label>
      <label>
        Path
        <input name="path" type="search" placeholder="/api/chats">
      </label>
      <label>
        From
        <input name="from" type="datetime-local">
      </label>
      <label>
        To
        <input name="to" type="datetime-local">
      </label>
      <button type="submit">Refresh</button>
    </form>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Level</th>
            <th>Message</th>
            <th>Request</th>
            <th>Status</th>
            <th>Duration</th>
            <th>User</th>
            <th>Trace</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8" class="muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      <button id="prev" type="button" aria-label="Previous page">&lt;</button>
      <span id="page">Page 1</span>
      <button id="next" type="button" aria-label="Next page">&gt;</button>
    </div>
  </main>

  <script>
    const state = { page: 1, pageSize: 50, total: 0 };
    const form = document.getElementById('filters');
    const rows = document.getElementById('rows');
    const pageLabel = document.getElementById('page');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const token = document.getElementById('token');
    const saveToken = document.getElementById('save-token');

    token.value = sessionStorage.getItem('adminLogsToken') ?? '';

    function html(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function toIso(value) {
      return value ? new Date(value).toISOString() : '';
    }

    async function loadLogs() {
      const data = new FormData(form);
      const params = new URLSearchParams({
        page: state.page,
        pageSize: state.pageSize
      });

      for (const [key, value] of data.entries()) {
        if (!value) continue;
        params.set(key, key === 'from' || key === 'to' ? toIso(value) : value);
      }

      rows.innerHTML = '<tr><td colspan="8" class="muted">Loading...</td></tr>';

      const headers = {};
      if (token.value) {
        headers.Authorization = `Bearer ${token.value}`;
      }

      const response = await fetch(`/api/admin/logs?${params.toString()}`, { headers });
      if (!response.ok) {
        rows.innerHTML = `<tr><td colspan="8" class="muted">Failed to load logs: ${response.status}</td></tr>`;
        return;
      }

      const result = await response.json();
      state.total = result.total;

      if (!result.items.length) {
        rows.innerHTML = '<tr><td colspan="8" class="muted">No logs found.</td></tr>';
      } else {
        rows.innerHTML = result.items.map(item => `
          <tr>
            <td>${html(new Date(item.timestamp).toLocaleString())}</td>
            <td><span class="level ${html(item.level)}">${html(item.level)}</span></td>
            <td class="message" title="${html(item.exception)}">${html(item.message)}</td>
            <td>${html([item.httpMethod, item.requestPath].filter(Boolean).join(' '))}</td>
            <td>${html(item.statusCode ?? '')}</td>
            <td>${html(item.elapsedMilliseconds == null ? '' : `${item.elapsedMilliseconds} ms`)}</td>
            <td>${html(item.userName ?? item.userId ?? '')}</td>
            <td>${html(item.traceId ?? '')}</td>
          </tr>
        `).join('');
      }

      const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
      pageLabel.textContent = `Page ${state.page} of ${totalPages}`;
      prev.disabled = state.page <= 1;
      next.disabled = state.page >= totalPages;
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      state.page = 1;
      loadLogs();
    });

    prev.addEventListener('click', () => {
      state.page = Math.max(1, state.page - 1);
      loadLogs();
    });

    next.addEventListener('click', () => {
      state.page += 1;
      loadLogs();
    });

    saveToken.addEventListener('click', () => {
      sessionStorage.setItem('adminLogsToken', token.value);
      state.page = 1;
      loadLogs();
    });

    loadLogs();
  </script>
</body>
</html>
